<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Zeph AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-[#0A0A0A] text-white font-['Inter'] antialiased">
<div id="app" class="flex h-screen overflow-hidden">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

    <aside id="sidebar" class="w-64 bg-[#111] flex flex-col border-r border-white/5 z-30 transition-all duration-300">
        <div class="p-4 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center">
                    <span class="text-white font-bold text-lg">Z</span>
                </div>
                <span class="logo-text font-semibold text-white">Zeph AI</span>
            </div>
            <button id="new-chat-btn" class="p-1.5 rounded-lg hover:bg-white/5 text-white/60 hover:text-white transition" title="Chat Baru">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            </button>
        </div>

        <div class="px-3 py-3 flex-shrink-0">
            <div class="rounded-xl px-3 py-1.5 flex items-center gap-2 border border-white/5 bg-white/[0.04]">
                <svg class="w-4 h-4 text-white/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input id="search-chat" type="text" placeholder="Cari chat..." class="bg-transparent border-none outline-none text-white/70 text-sm w-full placeholder-white/30" />
            </div>
        </div>

        <div class="flex-1 overflow-y-auto overflow-x-hidden px-2 pb-2 custom-scrollbar">
            <div class="text-xs text-white/30 uppercase tracking-wider px-2 py-2 font-medium">Recent</div>
            <div id="history-list" class="space-y-0.5"></div>
            
            <div class="text-xs text-white/30 uppercase tracking-wider px-2 py-3 mt-2 font-medium">Favorites</div>
            <div id="fav-list" class="space-y-0.5"></div>
        </div>

        <div class="border-t border-white/5 p-3 flex-shrink-0 space-y-0.5">
            <button class="sidebar-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-white/70 hover:bg-white/5 hover:text-white transition" id="settings-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Pengaturan
            </button>
            <button class="sidebar-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-white/70 hover:bg-white/5 hover:text-white transition" id="help-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Bantuan
            </button>
            <button class="sidebar-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-white/70 hover:bg-white/5 hover:text-white transition" id="upgrade-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                Upgrade <span class="badge-pro ml-auto text-xs bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-1.5 py-0.5 rounded-md">Pro</span>
            </button>
            <button class="sidebar-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-white/70 hover:bg-white/5 hover:text-white transition" id="toggle-sidebar-btn">
                <svg id="toggle-sidebar-icon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
                <span id="toggle-sidebar-label">Sembunyikan</span>
            </button>
        </div>
    </aside>

    <div id="chat-area" class="flex-1 flex flex-col h-full bg-[#0A0A0A]">
        <header class="flex items-center justify-between px-3 sm:px-4 py-2.5 border-b border-white/5 flex-shrink-0 bg-[#0A0A0A]/80 backdrop-blur-md gap-2 overflow-hidden">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0 flex-shrink overflow-hidden">
                <button id="menu-toggle" class="flex-shrink-0 p-1.5 rounded-lg hover:bg-white/5 text-white/60 hover:text-white transition lg:hidden" title="Tampilkan/Sembunyikan Sidebar">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="logo-text text-base font-semibold flex-shrink-0">Zeph AI</span>
                
                <select id="model-select" class="min-w-0 bg-white/5 border border-white/10 text-xs text-white/80 rounded-lg px-2.5 py-1.5 outline-none cursor-pointer hover:bg-white/10 transition">
                    <option value="openai/gpt-oss-20b" selected class="bg-neutral-900">GPT-OSS 20B (cepat)</option>
                    <option value="openai/gpt-oss-120b" class="bg-neutral-900">GPT-OSS 120B</option>
                    <option value="llama-3.3-70b-versatile" class="bg-neutral-900">Llama 3.3 70B</option>
                </select>

                <div class="hidden sm:flex items-center gap-1 ml-2 flex-shrink-0">
                    <button id="export-txt" class="text-white/40 hover:text-white/70 text-xs px-2 py-1 rounded border border-white/10 transition">📄 TXT</button>
                    <button id="export-md" class="text-white/40 hover:text-white/70 text-xs px-2 py-1 rounded border border-white/10 transition">📝 MD</button>
                    <button id="import-btn" class="text-white/40 hover:text-white/70 text-xs px-2 py-1 rounded border border-white/10 transition">📂 Import</button>
                </div>
            </div>

            
            <div class="flex items-center gap-2 flex-shrink-0">
                <button id="dark-toggle" class="p-2 rounded-xl hover:bg-white/5 text-white/60 hover:text-white transition" title="Ganti Tema">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-semibold text-sm cursor-pointer hover:opacity-90 transition" id="profile-btn">U</div>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 custom-scrollbar">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center px-4 max-w-2xl mx-auto">
                <div class="w-20 h-20 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center mb-5 shadow-inner">
                    <span class="text-4xl font-bold text-white">Z</span>
                </div>
                <h1 class="text-3xl font-semibold tracking-tight mb-2">Zeph AI</h1>
                <p class="text-white/50 text-base mb-6">Ada yang bisa Zeph AI bantu hari ini?</p>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5 w-full">
                    <button class="suggestion-card p-3 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.06] text-left transition flex flex-col gap-2" data-prompt="Jelaskan kode ini kepada saya:">
                        <span class="text-xl">💻</span>
                        <span class="text-xs text-white/80 font-medium">Jelaskan Kode</span>
                    </button>
                    <button class="suggestion-card p-3 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.06] text-left transition flex flex-col gap-2" data-prompt="Tulis artikel tentang ">
                        <span class="text-xl">✍️</span>
                        <span class="text-xs text-white/80 font-medium">Tulis Artikel</span>
                    </button>
                    <button class="suggestion-card p-3 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.06] text-left transition flex flex-col gap-2" data-prompt="Terjemahkan teks berikut ke bahasa Indonesia: ">
                        <span class="text-xl">🌐</span>
                        <span class="text-xs text-white/80 font-medium">Terjemahkan</span>
                    </button>
                    <button class="suggestion-card p-3 rounded-xl border border-white/5 bg-white/[0.02] hover:bg-white/[0.06] text-left transition flex flex-col gap-2" data-prompt="Perbaiki bug pada kode berikut: ">
                        <span class="text-xl">🐛</span>
                        <span class="text-xs text-white/80 font-medium">Fix Bug</span>
                    </button>
                </div>
            </div>
            
            <div id="message-container" class="flex flex-col gap-4 max-w-3xl mx-auto w-full"></div>
        </div>

        <div id="chat-input-wrap" class="p-4 max-w-3xl w-full mx-auto flex-shrink-0">
            <div id="chat-input-inner" class="flex items-center gap-2 p-2 rounded-2xl border border-white/10 bg-white/[0.03] focus-within:border-white/20 transition">
                <button id="emoji-btn" class="p-2 text-white/40 hover:text-white/80 transition" title="Emoji">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </button>
                <button id="upload-btn" class="p-2 text-white/40 hover:text-white/80 transition" title="Unggah Berkas">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                </button>
                <button id="voice-btn" class="p-2 text-white/40 hover:text-white/80 transition" title="Input Suara">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                </button>
                
                <textarea id="chat-input" rows="1" placeholder="Tanyakan apa saja..." class="flex-1 bg-transparent border-none outline-none text-white text-sm resize-none max-h-32 placeholder-white/30 custom-scrollbar py-1.5"></textarea>
                
                <button id="clear-btn" class="p-2 text-white/30 hover:text-white/60 transition" title="Bersihkan Chat">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
                
                <button id="send-btn" class="bg-white text-black hover:bg-white/90 text-xs font-semibold px-3 py-2 rounded-xl flex items-center gap-1.5 transition">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    Kirim
                </button>
                
                <button id="stop-btn" class="hidden p-2 text-red-400 hover:text-red-300 transition" title="Hentikan Proses">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                </button>
            </div>
            
            <div class="text-[11px] text-white/30 mt-2 px-1 flex justify-between">
                <span>Tekan <kbd class="px-1 py-0.5 rounded bg-white/10">Enter ↵</kbd> untuk kirim · <kbd class="px-1 py-0.5 rounded bg-white/10">Shift + Enter</kbd> baris baru</span>
                <span id="char-counter">0</span>
            </div>
        </div>
    </div>

    <div id="settings-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-[#141414] border border-white/10 rounded-2xl w-full max-w-md p-6 relative shadow-2xl space-y-4">
            <button id="settings-close" class="absolute top-4 right-4 text-white/40 hover:text-white text-xl" title="Tutup">&times;</button>
            <h2 class="text-lg font-semibold text-white border-b border-white/10 pb-3">Pengaturan</h2>

            <div class="space-y-3 max-h-[60vh] overflow-y-auto pr-1 custom-scrollbar text-sm">
                <div class="flex justify-between items-center">
                    <label class="text-white/70">Tema</label>
                    <select id="set-theme" class="bg-white/5 border border-white/10 text-white rounded-lg px-2.5 py-1 outline-none">
                        <option value="dark" class="bg-neutral-900">Dark</option>
                        <option value="light" class="bg-neutral-900">Light</option>
                    </select>
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Bahasa</label>
                    <select id="set-lang" class="bg-white/5 border border-white/10 text-white rounded-lg px-2.5 py-1 outline-none">
                        <option value="id" class="bg-neutral-900">Indonesia</option>
                        <option value="en" class="bg-neutral-900">English</option>
                    </select>
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Ukuran Font (<span id="fontsize-label">15px</span>)</label>
                    <input type="range" id="set-fontsize" min="12" max="20" step="1" class="accent-indigo-500" />
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Simpan riwayat chat</label>
                    <input type="checkbox" id="set-history" class="accent-indigo-500 w-4 h-4 rounded" />
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Auto-scroll</label>
                    <input type="checkbox" id="set-autoscroll" class="accent-indigo-500 w-4 h-4 rounded" />
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Streaming respons</label>
                    <input type="checkbox" id="set-streaming" class="accent-indigo-500 w-4 h-4 rounded" />
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Lebar Sidebar (px)</label>
                    <input type="range" id="set-sidebarwidth" min="220" max="360" step="10" class="accent-indigo-500" />
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Radius Bubble Chat (px)</label>
                    <input type="range" id="set-bubbleradius" min="4" max="28" step="1" class="accent-indigo-500" />
                </div>

                <div class="flex justify-between items-center">
                    <label class="text-white/70">Kecepatan Animasi</label>
                    <select id="set-animspeed" class="bg-white/5 border border-white/10 text-white rounded-lg px-2.5 py-1 outline-none">
                        <option value="fast" class="bg-neutral-900">Cepat</option>
                        <option value="normal" class="bg-neutral-900">Normal</option>
                        <option value="slow" class="bg-neutral-900">Lambat</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-2 pt-3 border-t border-white/10">
                <button id="settings-cancel" class="px-4 py-1.5 rounded-lg border border-white/10 text-xs text-white/70 hover:bg-white/5 transition">Batal</button>
                <button id="settings-save" class="px-4 py-1.5 rounded-lg bg-indigo-600 text-xs font-medium text-white hover:bg-indigo-500 transition">Simpan</button>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
